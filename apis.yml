apis:
  - aid: confido-legal:graphql-api
    name: Confido Legal GraphQL API
    description: >-
      The Confido Legal GraphQL API is the unified developer interface for the
      Confido payments platform. Partners and law-firm developers use it to
      tokenize payment methods, accept ACH and card payments with automated
      routing to operating or trust (IOLTA) accounts, issue real-time
      disbursements, manage payors and payees, and reconcile transactions. The
      API enforces legal-industry compliance rules (PCI, IOLTA segregation,
      surcharge rules) at the platform layer so partners do not have to
      replicate them.
    humanURL: https://docs.confidolegal.com/
    baseURL: https://api.gravity-legal.com/
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    tags:
      - GraphQL
      - IOLTA
      - Payments
      - Trust Accounting
    properties:
