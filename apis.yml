        url: https://docs.confidolegal.com/
      - type: GraphQL Endpoint
        url: https://api.gravity-legal.com/
      - type: Sandbox
        url: https://api.sandbox.gravity-legal.com/
      - type: API Playground
        url: https://studio.apollographql.com/
      - type: LLMs
        url: https://docs.confidolegal.com/llms.txt
    contact:
